openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: WB Ad Optimizer API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Product and unit economics
  - name: campaigns
    description: Ad campaigns
  - name: keywords
    description: Keywords and clusters
  - name: experiments
    description: Bid experiments
  - name: dashboard
    description: Dashboard summaries
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product with unit economics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /campaigns:
    get:
      operationId: listCampaigns
      tags: [campaigns]
      summary: List all campaigns
      responses:
        "200":
          description: List of campaigns
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Campaign"
    post:
      operationId: createCampaign
      tags: [campaigns]
      summary: Create a campaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CampaignInput"
      responses:
        "201":
          description: Created campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"

  /campaigns/{id}:
    get:
      operationId: getCampaign
      tags: [campaigns]
      summary: Get a campaign with keywords
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Campaign with keywords
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignWithKeywords"
    patch:
      operationId: updateCampaign
      tags: [campaigns]
      summary: Update a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CampaignUpdate"
      responses:
        "200":
          description: Updated campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
    delete:
      operationId: deleteCampaign
      tags: [campaigns]
      summary: Delete a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /keywords:
    get:
      operationId: listKeywords
      tags: [keywords]
      summary: List keywords, optionally filtered by campaign
      parameters:
        - name: campaignId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of keywords with CPO analysis
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Keyword"
    post:
      operationId: createKeyword
      tags: [keywords]
      summary: Create a keyword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KeywordInput"
      responses:
        "201":
          description: Created keyword
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Keyword"

  /keywords/{id}:
    patch:
      operationId: updateKeyword
      tags: [keywords]
      summary: Update keyword stats or status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KeywordUpdate"
      responses:
        "200":
          description: Updated keyword
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Keyword"
    delete:
      operationId: deleteKeyword
      tags: [keywords]
      summary: Delete a keyword
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /keywords/{id}/move-to-minus:
    post:
      operationId: moveKeywordToMinus
      tags: [keywords]
      summary: Move keyword to minus cluster
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Keyword moved to minus cluster
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Keyword"

  /experiments:
    get:
      operationId: listExperiments
      tags: [experiments]
      summary: List all bid experiments
      responses:
        "200":
          description: List of experiments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Experiment"
    post:
      operationId: createExperiment
      tags: [experiments]
      summary: Create a bid experiment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExperimentInput"
      responses:
        "201":
          description: Created experiment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Experiment"

  /experiments/{id}:
    get:
      operationId: getExperiment
      tags: [experiments]
      summary: Get experiment with snapshots
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Experiment with snapshots
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExperimentWithSnapshots"
    patch:
      operationId: updateExperiment
      tags: [experiments]
      summary: Update experiment status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExperimentUpdate"
      responses:
        "200":
          description: Updated experiment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Experiment"

  /experiments/{id}/snapshots:
    post:
      operationId: addExperimentSnapshot
      tags: [experiments]
      summary: Add a snapshot measurement to an experiment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SnapshotInput"
      responses:
        "201":
          description: Added snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Snapshot"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/cpo-analysis:
    get:
      operationId: getCpoAnalysis
      tags: [dashboard]
      summary: Get CPO vs income analysis for all keywords
      responses:
        "200":
          description: CPO analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CpoAnalysis"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        sku:
          type: string
        price:
          type: number
        wbCommission:
          type: number
        logisticsCost:
          type: number
        costPrice:
          type: number
        incomePerSale:
          type: number
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - sku
        - price
        - wbCommission
        - logisticsCost
        - costPrice
        - incomePerSale
        - createdAt

    ProductInput:
      type: object
      properties:
        name:
          type: string
        sku:
          type: string
        price:
          type: number
        wbCommission:
          type: number
        logisticsCost:
          type: number
        costPrice:
          type: number
      required:
        - name
        - sku
        - price
        - wbCommission
        - logisticsCost
        - costPrice

    ProductUpdate:
      type: object
      properties:
        name:
          type: string
        sku:
          type: string
        price:
          type: number
        wbCommission:
          type: number
        logisticsCost:
          type: number
        costPrice:
          type: number

    Campaign:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: integer
        name:
          type: string
        status:
          type: string
        totalSpend:
          type: number
        totalOrders:
          type: integer
        avgCpo:
          type: number
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - productId
        - name
        - status
        - totalSpend
        - totalOrders
        - avgCpo
        - createdAt

    CampaignInput:
      type: object
      properties:
        productId:
          type: integer
        name:
          type: string
        status:
          type: string
      required:
        - productId
        - name
        - status

    CampaignUpdate:
      type: object
      properties:
        name:
          type: string
        status:
          type: string

    CampaignWithKeywords:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: integer
        name:
          type: string
        status:
          type: string
        totalSpend:
          type: number
        totalOrders:
          type: integer
        avgCpo:
          type: number
        createdAt:
          type: string
          format: date-time
        keywords:
          type: array
          items:
            $ref: "#/components/schemas/Keyword"
      required:
        - id
        - productId
        - name
        - status
        - totalSpend
        - totalOrders
        - avgCpo
        - createdAt
        - keywords

    Keyword:
      type: object
      properties:
        id:
          type: integer
        campaignId:
          type: integer
        phrase:
          type: string
        cluster:
          type: string
        spend:
          type: number
        orders:
          type: integer
        cpo:
          type: number
        status:
          type: string
        lossPerOrder:
          type: ["number", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - campaignId
        - phrase
        - cluster
        - spend
        - orders
        - cpo
        - status
        - lossPerOrder
        - createdAt

    KeywordInput:
      type: object
      properties:
        campaignId:
          type: integer
        phrase:
          type: string
        cluster:
          type: string
        spend:
          type: number
        orders:
          type: integer
      required:
        - campaignId
        - phrase
        - cluster
        - spend
        - orders

    KeywordUpdate:
      type: object
      properties:
        phrase:
          type: string
        cluster:
          type: string
        spend:
          type: number
        orders:
          type: integer
        status:
          type: string

    Experiment:
      type: object
      properties:
        id:
          type: integer
        campaignId:
          type: integer
        name:
          type: string
        initialBid:
          type: number
        currentBid:
          type: number
        status:
          type: string
        conclusion:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - campaignId
        - name
        - initialBid
        - currentBid
        - status
        - conclusion
        - createdAt

    ExperimentInput:
      type: object
      properties:
        campaignId:
          type: integer
        name:
          type: string
        initialBid:
          type: number
      required:
        - campaignId
        - name
        - initialBid

    ExperimentUpdate:
      type: object
      properties:
        currentBid:
          type: number
        status:
          type: string
        conclusion:
          type: string

    Snapshot:
      type: object
      properties:
        id:
          type: integer
        experimentId:
          type: integer
        bid:
          type: number
        avgPosition:
          type: number
        traffic:
          type: integer
        cpo:
          type: number
        orders:
          type: integer
        recordedAt:
          type: string
          format: date-time
      required:
        - id
        - experimentId
        - bid
        - avgPosition
        - traffic
        - cpo
        - orders
        - recordedAt

    SnapshotInput:
      type: object
      properties:
        bid:
          type: number
        avgPosition:
          type: number
        traffic:
          type: integer
        cpo:
          type: number
        orders:
          type: integer
      required:
        - bid
        - avgPosition
        - traffic
        - cpo
        - orders

    ExperimentWithSnapshots:
      type: object
      properties:
        id:
          type: integer
        campaignId:
          type: integer
        name:
          type: string
        initialBid:
          type: number
        currentBid:
          type: number
        status:
          type: string
        conclusion:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        snapshots:
          type: array
          items:
            $ref: "#/components/schemas/Snapshot"
      required:
        - id
        - campaignId
        - name
        - initialBid
        - currentBid
        - status
        - conclusion
        - createdAt
        - snapshots

    DashboardSummary:
      type: object
      properties:
        totalProducts:
          type: integer
        totalCampaigns:
          type: integer
        totalKeywords:
          type: integer
        profitableKeywords:
          type: integer
        lossKeywords:
          type: integer
        totalSpend:
          type: number
        totalOrders:
          type: integer
        avgCpo:
          type: number
        totalLoss:
          type: number
        activeExperiments:
          type: integer
      required:
        - totalProducts
        - totalCampaigns
        - totalKeywords
        - profitableKeywords
        - lossKeywords
        - totalSpend
        - totalOrders
        - avgCpo
        - totalLoss
        - activeExperiments

    CpoAnalysisItem:
      type: object
      properties:
        keywordId:
          type: integer
        phrase:
          type: string
        cluster:
          type: string
        campaignName:
          type: string
        productName:
          type: string
        spend:
          type: number
        orders:
          type: integer
        cpo:
          type: number
        incomePerSale:
          type: number
        profitable:
          type: boolean
        lossPerOrder:
          type: ["number", "null"]
        status:
          type: string
      required:
        - keywordId
        - phrase
        - cluster
        - campaignName
        - productName
        - spend
        - orders
        - cpo
        - incomePerSale
        - profitable
        - lossPerOrder
        - status

    CpoAnalysis:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CpoAnalysisItem"
        totalLoss:
          type: number
        lossKeywordsCount:
          type: integer
        profitableKeywordsCount:
          type: integer
      required:
        - items
        - totalLoss
        - lossKeywordsCount
        - profitableKeywordsCount
